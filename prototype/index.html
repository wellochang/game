<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>廢土衝鋒 — v0.5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0900;display:flex;flex-direction:column;align-items:center;
     justify-content:center;min-height:100vh;font-family:'Courier New',monospace;
     color:#ddd;overflow-x:hidden}

h1{font-size:clamp(16px,5vw,22px);color:#e8a040;margin-bottom:6px;letter-spacing:3px}
.sub{font-size:12px;color:#664433;margin-bottom:20px;display:block}
.section-lbl{color:#664422;font-size:10px;margin-bottom:8px;letter-spacing:1px;
  border-bottom:1px solid #1e1000;padding-bottom:3px}

/* 車體選擇 */
#chassis-sel{text-align:center;width:100%;padding:24px 16px}
.cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.card{background:#120b00;border:2px solid #2e1e00;padding:18px 16px;
      width:min(200px,calc(100vw - 40px));cursor:pointer;text-align:left;transition:.12s}
.card:hover{background:#1c1200}
.card .cn{font-size:15px;font-weight:bold;margin-bottom:8px}
.card .cs{font-size:11px;color:#997744;margin-bottom:3px}
.card .cd{font-size:10px;color:#776655;margin-top:8px;line-height:1.7}

/* 武器配裝 */
#weapon-sel{display:none;width:100%;max-width:900px;padding:20px 16px;text-align:center}
#builder-layout{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  text-align:left;margin-top:4px}
#loadout-panel,#weapon-pool-panel{background:#120b00;border:1px solid #2e1e00;
  padding:14px;min-width:260px;flex:1;max-width:380px}

#slot-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.slot-box{width:28px;height:28px;border:1px solid #2e1e00;background:#0e0900;flex-shrink:0}

.loadout-item{display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;margin:3px 0;background:#1a1000;border:1px solid #2e1e00;cursor:pointer}
.loadout-item:hover{border-color:#cc5522}
.loadout-item .li-name{font-size:12px;font-weight:bold}
.loadout-item .li-stats{font-size:10px;color:#776655}
.loadout-item .li-rm{font-size:10px;color:#443322}

.pool-item{display:flex;align-items:center;gap:8px;padding:6px 8px;margin:3px 0;
  background:#0e0900;border:1px solid #1e1000;cursor:pointer}
.pool-item:hover:not(.disabled){background:#1a1000;border-color:#cc8833}
.pool-item.disabled{opacity:0.35;cursor:not-allowed}
.pool-item .pi-slots{background:#1e1200;border:1px solid #443322;color:#cc8833;
  font-size:10px;padding:1px 5px;min-width:26px;text-align:center;flex-shrink:0}
.pool-item .pi-name{font-size:12px;font-weight:bold;min-width:34px}
.pool-item .pi-stats{font-size:10px;color:#776655}

#confirm-btn{margin-top:12px;width:100%;background:#120900;border:1px solid #443322;
  color:#ccaa88;padding:8px 0;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:1px}
#confirm-btn:not([disabled]):hover{background:#1e1200}
#confirm-btn[disabled]{opacity:0.4;cursor:not-allowed}
#back-chassis{margin-top:12px;background:none;border:none;color:#554433;
  font-family:inherit;font-size:11px;cursor:pointer}

/* 戰鬥 */
#game{display:none;flex-direction:column;align-items:center;width:100%;max-width:900px}
canvas{display:block;width:100%;aspect-ratio:900/430}
#rotate-hint{display:none;font-size:11px;color:#664433;margin-top:8px;text-align:center}
@media (orientation:portrait) and (max-width:600px){#rotate-hint{display:block}}

/* 結果 */
#ov{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.82);flex-direction:column;gap:10px;padding:20px}
#ov h2{font-size:clamp(22px,6vw,36px);letter-spacing:5px}
#ov .stats{font-size:clamp(11px,3vw,13px);color:#aa8855;text-align:center;line-height:2.2}
.ov-btn{background:#120900;border:1px solid #443322;color:#ccaa88;padding:9px 28px;
  cursor:pointer;font-family:'Courier New',monospace;font-size:13px;letter-spacing:1px}
.ov-btn:hover{background:#1e1200}

/* 詳細日誌 */
#logpanel{width:100%;max-height:220px;overflow-y:auto;background:#060400;
  border:1px solid #1e1000;margin-top:6px;padding:6px 10px;font-size:11px;line-height:1.85}
#logpanel .lhdr{color:#664422;margin-bottom:2px;border-bottom:1px solid #1e1000;padding-bottom:2px}
#logpanel .plog{color:#88cc66}
#logpanel .elog{color:#cc5544}
#logpanel .slog{color:#554422}
</style>
</head>
<body>

<!-- ① 車體選擇 -->
<div id="chassis-sel">
  <h1>廢土衝鋒</h1>
  <span class="sub">選擇車體</span>
  <div class="cards" id="chassis-cards"></div>
</div>

<!-- ② 武器配裝 -->
<div id="weapon-sel">
  <h1>武器配裝</h1>
  <span class="sub" id="slot-hint">已用 0 / N 格</span>
  <div id="builder-layout">
    <div id="loadout-panel">
      <div class="section-lbl">已配置武器
        <span id="loadout-stance" style="float:right;color:#886644;font-size:10px"></span>
      </div>
      <div id="slot-grid"></div>
      <div id="loadout-list"></div>
      <button id="confirm-btn" disabled onclick="confirmLoadout()">確認出擊 →</button>
    </div>
    <div id="weapon-pool-panel">
      <div class="section-lbl">武器池</div>
      <div id="weapon-pool"></div>
    </div>
  </div>
  <button id="back-chassis" onclick="backToSel()">← 重新選擇車體</button>
</div>

<!-- ③ 戰鬥 -->
<div id="game">
  <canvas id="c" width="900" height="430"></canvas>
  <p id="rotate-hint">↺ 建議橫置裝置以獲得最佳體驗</p>
  <div id="logpanel"><div class="lhdr">━ 詳細戰鬥紀錄</div></div>
</div>

<!-- ④ 結果 -->
<div id="ov">
  <h2 id="ot"></h2>
  <div class="stats" id="ostats"></div>
  <button class="ov-btn" id="ov-btn2" style="display:none" onclick="continueToFight2()">繼續挑戰第二關 →</button>
  <button class="ov-btn" onclick="backToSel()">重新選擇</button>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// 座標常數
// ═══════════════════════════════════════════════
const SCALE   = 0.72;
const SY      = 152;
const GY      = 207;
const PANEL_Y = 244;
const LOG_Y   = 358;

// ═══════════════════════════════════════════════
// 資料定義
// ═══════════════════════════════════════════════
const CHASSIS = {
  light:  { name:'輕型突擊', spd:4.8, hp:100, slots:3, color:'#FF7744',
            desc:'速度最快，武器格少\n靠速度主動決勝' },
  medium: { name:'中型通用', spd:3.4, hp:160, slots:4, color:'#44AAFF',
            desc:'均衡配置\n適合各種戰術組合' },
  heavy:  { name:'重型堡壘', spd:2.2, hp:220, slots:6, color:'#AA8855',
            desc:'HP最厚，武器格最多\n慢速但火力全開' },
};

const WDEFS = {
  cannon:      { name:'機砲',   slots:1, range:320, cd:80,  dmg:22 },
  subCannon:   { name:'副砲',   slots:1, range:155, cd:38,  dmg:16 },
  missile:     { name:'飛彈',   slots:2, range:540, cd:180, dmg:48 },
  heavyCannon: { name:'重砲',   slots:2, range:400, cd:110, dmg:38 },
  ram:         { name:'衝角',   slots:1, range:52,  cd:38,  melee:true },
  shotgun:     { name:'散彈',   slots:1, range:90,  cd:25,  dmg:10 },
};

const WCOL = {
  cannon:'#FFD700', subCannon:'#FFA040', missile:'#FF3366',
  heavyCannon:'#FF8C00', ram:'#cc6622', shotgun:'#CC9944'
};

const ENEMY1_DEF = {
  name:'攔截車', chassisId:'medium', color:'#FF5555',
  weapons:['cannon','heavyCannon','subCannon']
};
const ENEMY2_POOL = [
  { name:'飛彈狙擊', chassisId:'light',  color:'#FF44BB', weapons:['missile','cannon'] },
  { name:'重裝堡壘', chassisId:'heavy',  color:'#FF6644', weapons:['heavyCannon','heavyCannon','subCannon'] },
  { name:'衝撞獵手', chassisId:'light',  color:'#FF8844', weapons:['ram','cannon','subCannon'] },
];

// ═══════════════════════════════════════════════
// 背景元素
// ═══════════════════════════════════════════════
const TERRAIN = Array.from({length:22}, (_,i) => ({
  wx: i*120+Math.random()*70, y:4+Math.random()*22, r:3+Math.random()*5,
  len:18+Math.random()*38, type:Math.random()>0.45?'rock':'dash', spd:0.45+Math.random()*0.5
}));

// ═══════════════════════════════════════════════
// Ship
// ═══════════════════════════════════════════════
class Ship {
  constructor(isPlayer, chassisId, weaponIds, color, name) {
    this.isPlayer = isPlayer;
    const ch = CHASSIS[chassisId];
    this.chassisId   = chassisId;
    this.maxHp       = ch.hp;
    this.hp          = ch.hp;
    this.baseSpd     = ch.spd;
    this.color       = color;
    this.name        = name;
    this.weapons     = weaponIds.map(id => ({ ...WDEFS[id], id, timer:0 }));
    this.hitFlash    = 0;
    this.totalDmgOut = 0;
    this.totalDmgIn  = 0;
    this.hitCount    = 0;
  }
  calcDmg(w) {
    return w.melee ? this.baseSpd * 8 : w.dmg;
  }
  tick() {
    if (this.hitFlash > 0) this.hitFlash--;
    this.weapons.forEach(w => { if (w.timer > 0) w.timer--; });
  }
}

// ═══════════════════════════════════════════════
// 遊戲狀態
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let player, enemy, gap, phase, frame;
let combatLog     = [];
let fightDuration = 0;
let fightNum      = 0;
let worldX        = 0;
let floatingDmg   = [];
let playerSX      = 220;
let enemySX       = 700;
let savedChassis  = null;
let savedWeapons  = null;

// ═══════════════════════════════════════════════
// 建造器 UI
// ═══════════════════════════════════════════════
let builderChassis = null;
let builderLoadout = [];

(function buildChassisUI() {
  const cont = document.getElementById('chassis-cards');
  for (const [id, ch] of Object.entries(CHASSIS)) {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.borderColor = ch.color + '55';
    el.innerHTML = `
      <div class="cn" style="color:${ch.color}">${ch.name}</div>
      <div class="cs">HP ${ch.hp} &nbsp;|&nbsp; 速度 ${ch.spd} &nbsp;|&nbsp; 武器格 ${ch.slots}</div>
      <div class="cd" style="white-space:pre-line">${ch.desc}</div>`;
    el.addEventListener('click', () => selectChassis(id));
    cont.appendChild(el);
  }
})();

function selectChassis(chassisId) {
  builderChassis = chassisId;
  builderLoadout = [];
  document.getElementById('chassis-sel').style.display = 'none';
  document.getElementById('weapon-sel').style.display  = 'block';
  renderBuilder();
}

function renderBuilder() {
  const ch   = CHASSIS[builderChassis];
  const used = builderLoadout.reduce((s, id) => s + WDEFS[id].slots, 0);
  document.getElementById('slot-hint').textContent = `已用 ${used} / ${ch.slots} 格`;

  // 格子視覺
  const grid = document.getElementById('slot-grid');
  grid.innerHTML = '';
  let filled = 0;
  for (const wid of builderLoadout) {
    const w = WDEFS[wid];
    for (let s = 0; s < w.slots; s++) {
      const box = document.createElement('div');
      box.className = 'slot-box';
      box.style.background   = WCOL[wid] + '88';
      box.style.borderColor  = WCOL[wid] + 'aa';
      grid.appendChild(box);
      filled++;
    }
  }
  for (let i = filled; i < ch.slots; i++) {
    const box = document.createElement('div');
    box.className = 'slot-box';
    grid.appendChild(box);
  }

  // 已選清單
  const list = document.getElementById('loadout-list');
  list.innerHTML = '';
  builderLoadout.forEach((wid, idx) => {
    const w = WDEFS[wid];
    const dmgStr = w.melee ? 'spd×8' : w.dmg;
    const el = document.createElement('div');
    el.className = 'loadout-item';
    el.innerHTML = `
      <span class="li-name" style="color:${WCOL[wid]}">${w.name}</span>
      <span class="li-stats">${w.slots}格 射${w.range} 傷${dmgStr} CD${w.cd}</span>
      <span class="li-rm">✕</span>`;
    el.addEventListener('click', () => { builderLoadout.splice(idx,1); renderBuilder(); });
    list.appendChild(el);
  });

  // 戰術姿態預覽
  const ws = builderLoadout.map(id => ({...WDEFS[id], id}));
  if (builderLoadout.length) {
    const st = getStance(ws);
    document.getElementById('loadout-stance').textContent =
      `目標距離 ${st.targetGap}${st.fleeGap ? ` 逃<${st.fleeGap}` : ''}`;
  } else {
    document.getElementById('loadout-stance').textContent = '';
  }

  // 武器池
  const pool = document.getElementById('weapon-pool');
  pool.innerHTML = '';
  for (const [wid, w] of Object.entries(WDEFS)) {
    const rem    = ch.slots - used;
    const canAdd = rem >= w.slots;
    const dps    = w.melee ? `spd×8/CD` : `${(w.dmg/w.cd*60).toFixed(0)}/s`;
    const el = document.createElement('div');
    el.className = 'pool-item' + (canAdd ? '' : ' disabled');
    el.innerHTML = `
      <span class="pi-slots" style="color:${WCOL[wid]}">${w.slots}格</span>
      <span class="pi-name" style="color:${WCOL[wid]}">${w.name}</span>
      <span class="pi-stats">射${w.range} 傷${w.melee?'spd×8':w.dmg} DPS ${dps}</span>`;
    if (canAdd) el.addEventListener('click', () => { builderLoadout.push(wid); renderBuilder(); });
    pool.appendChild(el);
  }

  document.getElementById('confirm-btn').disabled = builderLoadout.length === 0;
}

function confirmLoadout() {
  document.getElementById('weapon-sel').style.display = 'none';
  startGame(builderChassis, builderLoadout, ENEMY1_DEF, 1);
}

// ═══════════════════════════════════════════════
// 戰術姿態
// ═══════════════════════════════════════════════
function getStance(weapons) {
  const hasRam     = weapons.some(w => w.id === 'ram');
  const hasMissile = weapons.some(w => w.id === 'missile');
  if (hasRam)     return { targetGap:30,  fleeGap:0   };
  if (hasMissile) return { targetGap:400, fleeGap:320 };
  return                 { targetGap:200, fleeGap:0   };
}

// ═══════════════════════════════════════════════
// 流程
// ═══════════════════════════════════════════════
function startGame(chassisId, weaponIds, enemyDef, fn) {
  savedChassis = chassisId;
  savedWeapons = weaponIds;
  fightNum     = fn;

  const ch = CHASSIS[chassisId];
  player = new Ship(true,  chassisId, weaponIds, ch.color, ch.name);
  enemy  = new Ship(false, enemyDef.chassisId, enemyDef.weapons, enemyDef.color, enemyDef.name);

  gap           = 400;
  phase         = 'combat';
  combatLog     = [];
  fightDuration = 0;
  worldX        = 0;
  floatingDmg   = [];
  frame         = 0;

  const panel = document.getElementById('logpanel');
  panel.innerHTML = `<div class="lhdr">━ 第${fn}關 詳細戰鬥紀錄</div>`;
  const fmtWpns = ship => ship.weapons.map(w =>
    `${w.name}(射${w.range},CD${w.cd},傷${w.melee?'spd×8':w.dmg})`).join(' + ');
  const pSt = getStance(player.weapons);
  const eSt = getStance(enemy.weapons);
  appendLog(`玩家: ${player.name}  HP=${player.maxHp}  速度=${player.baseSpd.toFixed(1)}  [${fmtWpns(player)}]`, 'plog');
  appendLog(`敵方: ${enemy.name}  HP=${enemy.maxHp}  速度=${enemy.baseSpd.toFixed(1)}  [${fmtWpns(enemy)}]`, 'elog');
  appendLog(`初始gap=400  玩家姿態 target=${pSt.targetGap} flee=${pSt.fleeGap}  敵方姿態 target=${eSt.targetGap} flee=${eSt.fleeGap}`, 'slog');

  document.getElementById('ov-btn2').style.display = 'none';
  document.getElementById('game').style.display    = 'flex';
  requestAnimationFrame(loop);
}

function backToSel() {
  phase = 'sel';
  document.getElementById('ov').style.display          = 'none';
  document.getElementById('game').style.display        = 'none';
  document.getElementById('weapon-sel').style.display  = 'none';
  document.getElementById('chassis-sel').style.display = 'block';
}

function continueToFight2() {
  document.getElementById('ov').style.display   = 'none';
  document.getElementById('game').style.display = 'none';
  const e2 = ENEMY2_POOL[Math.floor(Math.random() * ENEMY2_POOL.length)];
  startGame(savedChassis, savedWeapons, e2, 2);
}

// ═══════════════════════════════════════════════
// 核心更新
// ═══════════════════════════════════════════════
function loop() {
  if (phase !== 'combat') return;
  frame++;
  tick(); tick();
  render();
  requestAnimationFrame(loop);
}

function tick() {
  if (phase !== 'combat') return;
  fightDuration++;
  player.tick();
  enemy.tick();
  const pSpd = playerEffSpd();
  const eSpd = enemyEffSpd();
  gap = Math.max(0, Math.min(720, gap + (eSpd - pSpd)));
  worldX += pSpd;
  if (fightDuration % 120 === 0) logStatus(pSpd, eSpd);
  fire(player, enemy);
  fire(enemy,  player);
  if (enemy.hp  <= 0 && phase === 'combat') endGame(true);
  if (player.hp <= 0 && phase === 'combat') endGame(false);
}

function playerEffSpd() {
  const { targetGap, fleeGap } = getStance(player.weapons);
  if (gap > targetGap + 30)          return player.baseSpd;
  if (fleeGap > 0 && gap < fleeGap) return player.baseSpd;
  return 0;
}

function enemyEffSpd() {
  const { targetGap, fleeGap } = getStance(enemy.weapons);
  if (fleeGap > 0 && gap < fleeGap) return enemy.baseSpd;       // 飛彈型：逃離近距
  if (gap > targetGap + 30)         return enemy.baseSpd * 0.35; // 降速讓玩家追上
  return enemy.baseSpd * 0.35;                                   // 在射程帶內緩速
}

function fire(src, tgt) {
  for (const w of src.weapons) {
    if (w.timer <= 0 && gap <= (w.range || 0)) {
      const raw = src.calcDmg(w);
      const rnd = 0.9 + Math.random() * 0.2;
      const dmg = raw * rnd;
      const hpBefore = Math.round(tgt.hp);
      tgt.hp = Math.max(0, tgt.hp - dmg);
      const hpAfter  = Math.round(tgt.hp);
      tgt.hitFlash     = 7;
      src.totalDmgOut += dmg;
      tgt.totalDmgIn  += dmg;
      src.hitCount++;
      addLog(`${src.isPlayer?'▶':'◀'} ${w.name}  −${Math.round(dmg)}`, src.isPlayer);

      const formula = w.melee
        ? `spd${src.baseSpd.toFixed(1)}×8=${raw.toFixed(1)}`
        : `基礎${w.dmg}`;
      const t  = String(fightDuration).padStart(5);
      const g  = String(Math.round(gap)).padStart(3);
      const tl = tgt.isPlayer ? '玩HP' : '敵HP';
      appendLog(
        `[t=${t}] ${src.isPlayer?'▶我方':'◀敵方'} ${w.name}  gap=${g}  ${formula} ×${rnd.toFixed(3)}=-${Math.round(dmg)}  ${tl}:${hpBefore}→${hpAfter}`,
        src.isPlayer ? 'plog' : 'elog'
      );

      floatingDmg.push({
        x:tgt.isPlayer?playerSX:enemySX, y:SY-30,
        text:`-${Math.round(dmg)}`, col:src.isPlayer?'#ffaa44':'#ff4455', age:0
      });
      w.timer = w.cd;
    }
  }
}

function addLog(text, isPlayer) {
  combatLog.unshift({ text, isPlayer, age:0 });
  if (combatLog.length > 4) combatLog.pop();
}

function appendLog(text, cls) {
  const panel = document.getElementById('logpanel');
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function logStatus(pSpd, eSpd) {
  const { targetGap:pTgt, fleeGap:pFlee } = getStance(player.weapons);
  const { targetGap:eTgt, fleeGap:eFlee } = getStance(enemy.weapons);
  const pMode = gap > pTgt+30 ? '追' : (pFlee>0&&gap<pFlee ? '逃' : '維持');
  const eMode = (eFlee>0&&gap<eFlee) ? '逃' : gap>eTgt+30 ? '待' : '維持';
  const delta = eSpd - pSpd;
  const t = String(fightDuration).padStart(5);
  const g = String(Math.round(gap)).padStart(3);
  appendLog(
    `[t=${t}] ── gap=${g}  玩家${pSpd.toFixed(2)}/t(${pMode})  敵方${eSpd.toFixed(2)}/t(${eMode})  Δgap/t${delta>=0?'+':''}${delta.toFixed(2)}`,
    'slog'
  );
}

// ═══════════════════════════════════════════════
// 結束
// ═══════════════════════════════════════════════
function endGame(win) {
  if (phase !== 'combat') return;
  phase = 'end';
  const sec = (fightDuration / 120).toFixed(1);
  document.getElementById('ot').textContent =
    win ? (fightNum === 1 ? '第一關勝利' : '最終勝利！') : '擊毀';
  document.getElementById('ot').style.color = win ? '#44ff88' : '#ff4444';
  document.getElementById('ostats').innerHTML =
    `${win?'擊毀敵車':'我方報廢'}　時長 ${sec} 秒<br>` +
    `我方輸出 ${Math.round(player.totalDmgOut)}　命中 ${player.hitCount} 次<br>` +
    `我方承受 ${Math.round(player.totalDmgIn)}　剩餘 HP ${Math.round(player.hp)} / ${player.maxHp}`;
  document.getElementById('ov-btn2').style.display = (win && fightNum===1) ? 'block' : 'none';
  document.getElementById('ov').style.display      = 'flex';
}

// ═══════════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════════
function render() {
  ctx.fillStyle = '#0e0900';
  ctx.fillRect(0, 0, 900, 430);

  const px = 220;
  const ex = px + gap * SCALE;
  playerSX = px;
  enemySX  = ex;

  drawDesertScene(px, ex);
  drawStatusBar(px, ex);
  drawRangeBeams(px, ex);
  drawCarIcon(px, SY, player);
  drawCarIcon(ex, SY, enemy);
  drawSpeedLabels(px, ex);
  drawFloatingDmg();
  drawWeaponPanels();
  drawCombatLog();
}

function drawStatusBar(px, ex) {
  drawHpBar(8, 6, 300, 22, player, true);
  drawHpBar(592, 6, 300, 22, enemy, false);

  const pSpd = playerEffSpd(), eSpd = enemyEffSpd();
  const diff = eSpd - pSpd;
  const trendTxt = diff < -0.1 ? '▼ 縮短' : diff > 0.1 ? '▲ 增加' : '= 持平';
  const trendCol = diff < -0.1 ? '#ff7744' : diff > 0.1 ? '#44aaff' : '#776655';

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ddbb55'; ctx.font = 'bold 22px Courier New';
  ctx.fillText(Math.round(gap), 450, 21);
  ctx.fillStyle = '#664422'; ctx.font = '9px Courier New';
  ctx.fillText('距 離', 450, 32);
  ctx.fillStyle = trendCol; ctx.font = 'bold 10px Courier New';
  ctx.fillText(trendTxt, 450, 44);
  ctx.fillStyle = '#443322'; ctx.font = '9px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(`第${fightNum}關 ${(fightDuration/120).toFixed(1)}s`, 895, 44);
}

function drawHpBar(x, y, w, h, ship, left) {
  const r = Math.max(0, ship.hp / ship.maxHp);
  ctx.fillStyle = '#100800'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = r > 0.5 ? '#44bb33' : r > 0.25 ? '#ddaa22' : '#dd3333';
  ctx.fillRect(x, y, w*r, h);
  if (ship.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,180,60,${ship.hitFlash/7*0.45})`;
    ctx.fillRect(x, y, w, h);
  }
  ctx.strokeStyle = '#2a1200'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = ship.color; ctx.font = 'bold 11px Courier New';
  ctx.textAlign = left ? 'left' : 'right';
  ctx.fillText(ship.name, left ? x : x+w, y-2);
  ctx.fillStyle = '#998866'; ctx.font = '10px Courier New';
  ctx.fillText(`${Math.round(ship.hp)} / ${ship.maxHp}`, left ? x+4 : x+w-4, y+h-4);
}

function drawDesertScene(px, ex) {
  const sky = ctx.createLinearGradient(0, 48, 0, GY);
  sky.addColorStop(0,'#0e0500'); sky.addColorStop(0.5,'#2c1100'); sky.addColorStop(1,'#481e00');
  ctx.fillStyle = sky; ctx.fillRect(0, 48, 900, GY-48);

  ctx.fillStyle = '#1c0900';
  const mesas = [
    [[0,GY],[0,GY-42],[88,GY-85],[195,GY-78],[268,GY-42],[268,GY]],
    [[340,GY],[340,GY-40],[462,GY-96],[570,GY-83],[655,GY-40],[655,GY]],
    [[710,GY],[710,GY-36],[800,GY-70],[895,GY-64],[930,GY-36],[930,GY]]
  ];
  mesas.forEach(pts => {
    ctx.beginPath();
    pts.forEach(([mx,my],i) => i===0 ? ctx.moveTo(mx,my) : ctx.lineTo(mx,my));
    ctx.closePath(); ctx.fill();
  });

  const grd = ctx.createLinearGradient(0,GY,0,245);
  grd.addColorStop(0,'#3a2208'); grd.addColorStop(1,'#1e1000');
  ctx.fillStyle = grd; ctx.fillRect(0, GY, 900, 245-GY);
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(900,GY); ctx.stroke();

  TERRAIN.forEach(d => {
    const sx = ((d.wx - worldX*d.spd) % 1400 + 1400) % 1400;
    if (d.type === 'rock') {
      ctx.fillStyle = 'rgba(80,45,15,0.5)';
      ctx.beginPath(); ctx.ellipse(sx,GY+d.y,d.r*1.5,d.r*0.7,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle = 'rgba(65,38,12,0.35)'; ctx.lineWidth = 1;
      ctx.setLineDash([d.len,22]);
      ctx.beginPath(); ctx.moveTo(sx,GY+d.y); ctx.lineTo(sx+d.len*2,GY+d.y); ctx.stroke();
      ctx.setLineDash([]);
    }
  });

  drawDust(px-32, SY+14);
  drawDust(ex-32, SY+14);
}

function drawDust(x, y) {
  for (let i = 0; i < 5; i++) {
    const dx = x - i*12 + (Math.random()-0.5)*4;
    const dy = y + (Math.random()-0.5)*5;
    ctx.fillStyle = `rgba(150,90,35,${0.20-i*0.035})`;
    ctx.beginPath(); ctx.arc(dx, dy, 4+i*2.5, 0, Math.PI*2); ctx.fill();
  }
}

function drawCarIcon(x, y, ship) {
  ctx.save();
  ctx.translate(x, y);
  if (ship.hitFlash > 0) ctx.filter = 'brightness(2.5)';
  const col = ship.color;
  const dk  = darker(col, 0.42);

  [[-25,12],[19,12]].forEach(([wx,wy]) => {
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(wx,wy,9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(wx,wy,9,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.arc(wx,wy,4,0,Math.PI*2); ctx.fill();
  });

  ctx.fillStyle=col; ctx.strokeStyle=dk; ctx.lineWidth=2;
  ctx.fillRect(-36,-8,72,19); ctx.strokeRect(-36,-8,72,19);
  ctx.fillStyle=darker(col,0.62); ctx.strokeStyle=dk; ctx.lineWidth=1.5;
  ctx.fillRect(-22,-20,38,14); ctx.strokeRect(-22,-20,38,14);
  ctx.fillStyle='#252525'; ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.fillRect(29,-5,7,16); ctx.strokeRect(29,-5,7,16);

  if (ship.weapons.some(w => w.id==='ram')) {
    ctx.fillStyle='#bbb'; ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(36,-1); ctx.lineTo(50,-5); ctx.lineTo(57,2); ctx.lineTo(50,7); ctx.lineTo(36,2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.filter = 'none';
  ctx.restore();
}

function drawSpeedLabels(px, ex) {
  const pSpd = playerEffSpd(), eSpd = enemyEffSpd();
  ctx.font = '10px Courier New'; ctx.textAlign = 'center';
  ctx.fillStyle = rgba(player.color, 0.75);
  ctx.fillText(`→ ${pSpd.toFixed(1)}/t`, px, SY+32);
  ctx.fillStyle = rgba(enemy.color, 0.75);
  ctx.fillText(`→ ${eSpd.toFixed(1)}/t`, ex, SY+32);
}

function drawRangeBeams(px, ex) {
  const oys = [-10, 6, -20, 18];
  player.weapons.forEach((w, i) => {
    if (!w.range) return;
    const inR  = gap <= w.range;
    const col  = WCOL[w.id] || '#aaa';
    const bx   = px + 40;
    const endX = Math.min(bx + w.range*SCALE, ex-38);
    const oy   = SY + oys[i % 4];
    ctx.strokeStyle = inR ? rgba(col,0.65) : rgba(col,0.14);
    ctx.lineWidth   = inR ? 2 : 1;
    ctx.setLineDash(inR ? [] : [4,5]);
    ctx.beginPath(); ctx.moveTo(bx,oy); ctx.lineTo(endX,oy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = inR ? rgba(col,0.9) : rgba(col,0.28);
    ctx.font = '9px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(w.name, bx+(endX-bx)/2, oy-4);
  });
  enemy.weapons.forEach((w, i) => {
    if (!w.range) return;
    const inR  = gap <= w.range;
    const bx   = ex - 40;
    const endX = Math.max(bx - w.range*SCALE, px+38);
    const oy   = SY + oys[i % 4];
    ctx.strokeStyle = inR ? 'rgba(255,80,80,0.60)' : 'rgba(255,80,80,0.12)';
    ctx.lineWidth   = inR ? 2 : 1;
    ctx.setLineDash(inR ? [] : [4,5]);
    ctx.beginPath(); ctx.moveTo(bx,oy); ctx.lineTo(endX,oy); ctx.stroke();
    ctx.setLineDash([]);
  });
}

function drawFloatingDmg() {
  floatingDmg = floatingDmg.filter(f => f.age < 52);
  floatingDmg.forEach(f => {
    f.age++;
    ctx.globalAlpha = 1 - f.age/52;
    ctx.fillStyle   = f.col;
    ctx.font = `bold ${15-Math.floor(f.age/18)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y - f.age*0.65);
    ctx.globalAlpha = 1;
  });
}

// ═══════════════════════════════════════════════
// 武器面板（2行×3列，最多6武器/側）
// ═══════════════════════════════════════════════
const CW = 130, CH = 50, CGAP = 4;

function getCardPos(idx, isPlayer) {
  const col = idx % 3, row = Math.floor(idx / 3);
  const y = PANEL_Y + row * (CH + CGAP);
  const x = isPlayer
    ? 8   + col * (CW + CGAP)
    : 892 - CW - col * (CW + CGAP);
  return { x, y };
}

function drawWeaponPanels() {
  ctx.fillStyle = '#554433'; ctx.font = '10px Courier New';
  ctx.textAlign = 'left';  ctx.fillText('我方武器', 8,   PANEL_Y-5);
  ctx.textAlign = 'right'; ctx.fillText('敵方武器', 892, PANEL_Y-5);
  player.weapons.forEach((w,i) => { const {x,y}=getCardPos(i,true);  drawWeaponCard(x,y,w,player); });
  enemy.weapons.forEach( (w,i) => { const {x,y}=getCardPos(i,false); drawWeaponCard(x,y,w,enemy);  });
}

function drawWeaponCard(x, y, w, ship) {
  const inR = gap <= (w.range || 0);
  const rdy = w.timer <= 0;
  const col = WCOL[w.id] || '#aa8844';
  const dmg = ship.calcDmg(w);

  ctx.fillStyle   = inR ? '#1a1000' : '#110a00';
  ctx.strokeStyle = inR ? rgba(col,0.5) : '#281500';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); rRect(x, y, CW, CH, 4); ctx.fill(); ctx.stroke();

  ctx.fillStyle = inR ? col : '#665544';
  ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(w.name, x+6, y+13);

  const sLabel = !inR ? '射程外' : (rdy ? '就緒' : 'CD');
  const sCol   = !inR ? '#443322' : (rdy ? '#44ee88' : '#ffaa33');
  ctx.fillStyle = sCol; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(sLabel, x+CW-5, y+13);

  ctx.fillStyle = '#eebb77'; ctx.font = '10px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(`傷 ${dmg.toFixed(0)}  射 ${w.range}`, x+6, y+27);

  const cdW = CW - 12;
  ctx.fillStyle = '#180e00'; ctx.fillRect(x+6, y+33, cdW, 6);
  if (inR) {
    const cdR = rdy ? 1 : 1 - w.timer/w.cd;
    ctx.fillStyle = rdy ? '#44ee88' : rgba(col,0.8);
    ctx.fillRect(x+6, y+33, cdW*cdR, 6);
  }
  ctx.fillStyle = '#776655'; ctx.font = '9px Courier New'; ctx.textAlign = 'right';
  if (inR && !rdy) ctx.fillText(`${(w.timer/60).toFixed(1)}s`, x+CW-5, y+47);
}

function drawCombatLog() {
  ctx.fillStyle = '#443322'; ctx.font = '10px Courier New';
  ctx.textAlign = 'left'; ctx.fillText('━ 紀錄', 10, LOG_Y-4);
  combatLog.forEach((e, i) => {
    e.age++;
    ctx.globalAlpha = Math.max(0.12, 1-e.age/200);
    ctx.fillStyle   = e.isPlayer ? '#88cc66' : '#cc5544';
    ctx.font = '11px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(e.text, 10, LOG_Y+12+i*14);
    ctx.globalAlpha = 1;
  });
}

// ═══════════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════════
function rgba(hex, a) {
  const n = parseInt(hex.replace('#',''),16);
  return `rgba(${(n>>16)&0xff},${(n>>8)&0xff},${n&0xff},${a})`;
}
function darker(hex, f) {
  const n = parseInt(hex.replace('#',''),16);
  return `rgb(${Math.round(((n>>16)&0xff)*f)},${Math.round(((n>>8)&0xff)*f)},${Math.round((n&0xff)*f)})`;
}
function rRect(x, y, w, h, r) {
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
